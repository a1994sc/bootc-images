---
name: Cleanup, daily
on:
  # every day at 01:30am
  schedule:
    - cron: '30 1 * * *'
  # or manually
  workflow_dispatch:
jobs:
  ghcr-cleanup-image:
    name: ghcr cleanup action
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        distro:
          - alma
          - rhel
        pkg:
          - bootc
          - rpm
        major:
          - "9"
          - "10"
        exclude:
          - distro: rhel
            pkg: rpm
            major: "9"
          - distro: rhel
            pkg: rpm
            major: "10"
    steps:
      - name: Delete old tags
        uses: dataaxiom/ghcr-cleanup-action@34a2b6c814b9c6bcb92f78cba3e56a7ab9ca7a86 # v1.1.0
        with:
          use-regex: true
          packages: "${{ github.event.repository.name }}/${{ matrix.pkg }}/${{ matrix.distro }}${{ matrix.major }}"
          keep-n-tagged: 2
          exclude-tags: "^latest$|^\\d+\\.\\d+-\\d+$"
          token: '${{ secrets.GITHUB_TOKEN }}'

      - name: Validate images
        uses: dataaxiom/ghcr-cleanup-action@34a2b6c814b9c6bcb92f78cba3e56a7ab9ca7a86 # v1.1.0
        with:
          packages: "${{ github.event.repository.name }}/${{ matrix.pkg }}/${{ matrix.distro }}${{ matrix.major }}"
          token: ${{ secrets.GITHUB_TOKEN }}
          validate: true
          delete-ghost-images: true
          delete-orphaned-images: true
